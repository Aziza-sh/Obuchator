services:
  db:
    image: postgres:16-alpine
    env_file: .env.example
    environment:
      - POSTGRES_DB=obuchator_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env.example
    volumes:
      - .:/app
    # command: >
    #   sh -c "
    #     alembic upgrade head &&
    #     uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    #   "

volumes:
  postgres_data:
  redis_data:
