<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Редактор курса | Обучатор</title>
    <link rel="stylesheet" href="static/styles/add_course_page.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="logo">
          <h1>Obuchator</h1>
        </div>
        <!-- Поиск -->
        <div class="center-search">
          <input
            type="text"
            class="search-center-input"
            placeholder="Поиск по сайту..."
            aria-label="Поиск"
          />
          <button class="search-center-button" type="button" aria-label="Найти">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="18"
              height="18"
            >
              <path
                fill="currentColor"
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
          </button>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Переключить тему"
        >
          🌙
        </button>
        <!-- Иконка профиля -->
        <div class="header-right">
          <div class="profile-menu">
            <button
              class="profile-button"
              aria-label="Профиль пользователя"
              onclick="location.href='profile_page.html'"
            >
              <p>Профиль</p>
              <svg
                class="profile-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path
                  fill="currentColor"
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="editor-container">
      <!-- Левая панель с уроками -->
      <div class="lesson-sidebar">
        <div class="sidebar-header">
          <h3>Уроки курса</h3>
          <span class="lesson-count" id="lesson-count">0</span>
        </div>
        <div class="lesson-list" id="lesson-list"></div>
        <button class="add-lesson-btn" id="add-lesson-btn">
          + Добавить лекцию
        </button>
        <button class="back-button" onclick="history.back()">
          <span>←</span> Назад
        </button>
      </div>

      <div class="lesson-editor">
        <div class="editor-header">
          <h2 id="editor-title">Редактирование урока</h2>
          <span class="save-status" id="save-status">✔ Все сохранено</span>
        </div>
        <div class="editor-form">
          <div class="form-group">
            <label for="lesson-name">Название урока</label>
            <input
              type="text"
              id="lesson-name"
              class="editor-input"
              placeholder="Введите название"
            />
          </div>

          <div class="editor-toolbar">
            <button type="button" data-command="h3" title="Заголовок">
              <strong>Заголовок</strong>
            </button>
            <button type="button" data-command="p" title="Параграф">
              Абзац
            </button>
            <button type="button" data-command="bold" title="Жирный">
              <strong>Жирный</strong>
            </button>
            <button type="button" data-command="italic" title="Курсив">
              <em>Курсив</em>
            </button>
            <button type="button" data-command="code" title="Блок кода">
              <code>&lt;/&gt;</code>
            </button>
            <button
              type="button"
              data-command="info"
              title="Информационный блок"
            >
              Info
            </button>
            <button
              type="button"
              data-command="ul"
              title="Маркированный список"
            >
              • Список
            </button>
            <button type="button" data-command="ol" title="Нумерованный список">
              1. Список
            </button>
            <button
              type="button"
              data-command="removeFormat"
              title="Очистить формат"
            >
              Очистить
            </button>
          </div>

          <!-- Редактируемый контент (div) -->
          <div class="form-group">
            <label for="lesson-content">Содержание</label>
            <div
              id="lesson-content"
              class="editable-content"
              contenteditable="true"
            ></div>
          </div>

          <!-- Кнопки действий -->
          <div class="editor-actions">
            <button class="preview-btn" id="preview-btn">Предпросмотр</button>
            <button class="save-btn" id="save-btn">Сохранить</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно предпросмотра -->
    <div
      id="preview-modal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      "
    >
      <div
        style="
          background: var(--panel-bg);
          color: var(--text-primary);
          width: 80%;
          max-width: 800px;
          max-height: 80vh;
          overflow-y: auto;
          border-radius: 20px;
          padding: 30px;
          position: relative;
        "
      >
        <button
          id="close-preview"
          style="
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-primary);
          "
        >
          &times;
        </button>
        <h2 id="preview-title" style="margin-top: 0"></h2>
        <div id="preview-content" style="line-height: 1.6"></div>
      </div>
    </div>

    <footer>
      <p>© ИТС</p>
    </footer>

    <script src="add_course.js"></script>
  </body>
</html>
