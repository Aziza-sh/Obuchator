<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Курсы | Обучатор</title>
    <link rel="stylesheet" href="styles/main_page.css" />
    <style>
      .courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        padding: 32px;
        max-width: 1200px;
        margin: 0 auto;
      }
      .course-card {
        background: var(--panel-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 2px 12px var(--card-shadow);
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .course-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 6px 24px var(--card-shadow-hover);
      }
      .course-card h3 {
        margin: 0;
        color: var(--text-primary);
        font-size: 18px;
      }
      .course-card p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.5;
        flex: 1;
      }
      .course-meta {
        display: flex;
        gap: 12px;
        font-size: 13px;
        color: var(--text-secondary);
      }
      .course-actions {
        display: flex;
        gap: 10px;
        margin-top: 4px;
      }
      .btn-primary {
        flex: 1;
        padding: 10px;
        background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: opacity 0.2s;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-subscribe {
        padding: 10px 14px;
        border: 2px solid var(--accent);
        background: none;
        color: var(--accent);
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        transition: all 0.2s;
      }
      .btn-subscribe.subscribed {
        background: var(--accent);
        color: #fff;
      }
      .btn-subscribe:hover { opacity: 0.85; }
      .page-header {
        padding: 32px 32px 0;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .page-header h2 {
        margin: 0;
        color: var(--text-primary);
        font-size: 28px;
      }
      .no-tg-banner {
        background: linear-gradient(90deg, #fff3cd, #ffeaa7);
        border: 1px solid #ffc107;
        border-radius: 12px;
        padding: 14px 20px;
        margin: 0 32px;
        max-width: 1136px;
        margin: 16px auto 0;
        font-size: 14px;
        color: #856404;
      }
      .no-tg-banner a { color: #0f6b64; font-weight: 600; }
      #loading { text-align: center; padding: 60px; color: var(--text-secondary); font-size: 18px; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="logo">
          <h1>Obuchator</h1>
        </div>
        <div class="center-search">
          <input type="text" class="search-center-input" placeholder="Поиск по сайту..." aria-label="Поиск" />
          <button class="search-center-button" type="button" aria-label="Найти">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18">
              <path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
          </button>
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Переключить тему">🌙</button>
        <div class="header-right">
          <div class="profile-menu">
            <button class="profile-button" aria-label="Профиль" onclick="location.href='profile_page.html'">
              <p>Профиль</p>
              <svg class="profile-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </button>
            <button id="logout-btn" class="action-btn logout-btn">Выйти</button>
          </div>
        </div>
      </div>
    </header>

    <div class="page-header">
      <h2>📚 Курсы</h2>
      <button class="btn-primary" style="width:auto;padding:10px 24px;" onclick="location.href='main_page.html'">← Главная</button>
    </div>

    <div id="tg-warning" style="display:none;" class="no-tg-banner">
      💡 Telegram не привязан. Вы можете подписываться на курсы, но уведомления будут приходить только после <a href="profile_page.html">привязки Telegram</a> в профиле.
    </div>

    <div id="loading">Загрузка курсов...</div>
    <div class="courses-grid" id="courses-grid" style="display:none;"></div>

    <footer><p>© ИТС</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      let tgLinked = false;

      async function loadCourses() {
        try {
          const [coursesRes, tgRes] = await Promise.all([
            API.get("/courses/"),
            API.get("/api/v1/telegram/status"),
          ]);

          tgLinked = tgRes.data.linked;
          if (!tgLinked) {
            document.getElementById("tg-warning").style.display = "block";
          }

          const courses = coursesRes.data;
          const grid = document.getElementById("courses-grid");
          document.getElementById("loading").style.display = "none";
          grid.style.display = "grid";

          if (!courses.length) {
            grid.innerHTML = "<p style='grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:40px;'>Пока нет доступных курсов</p>";
            return;
          }

          courses.forEach(course => {
            const card = document.createElement("div");
            card.className = "course-card";
            card.innerHTML = `
              <h3>${escHtml(course.name)}</h3>
              <p>${escHtml(course.description)}</p>
              <div class="course-meta">
                <span>📄 ${course.material_count} материалов</span>
              </div>
              <div class="course-actions">
                <button class="btn-primary" onclick="location.href='course_page.html?id=${course.id}'">Перейти к курсу</button>
                <button
                  class="btn-subscribe ${course.is_subscribed ? 'subscribed' : ''}"
                  id="sub-btn-${course.id}"
                  onclick="toggleSubscription('${course.id}', this)"
                >
                  ${course.is_subscribed ? '🔔 Подписан' : '🔕 Подписаться'}
                </button>
              </div>
            `;
            grid.appendChild(card);
          });
        } catch (e) {
          console.error(e);
          document.getElementById("loading").textContent = "Ошибка загрузки курсов";
        }
      }

      async function toggleSubscription(courseId, btn) {
        if (!courseId || courseId === 'null') return;
        const isSubscribed = btn.classList.contains("subscribed");
        try {
          if (isSubscribed) {
            await API.delete(`/courses/${courseId}/subscribe`);
            btn.classList.remove("subscribed");
            btn.textContent = "🔕 Подписаться";
          } else {
            await API.post(`/courses/${courseId}/subscribe`);
            btn.classList.add("subscribed");
            btn.textContent = "🔔 Подписан";
          }
        } catch (e) {
          const detail = e.response?.data?.detail;
          const msg = typeof detail === 'string'
            ? detail
            : (detail ? JSON.stringify(detail) : null)
              || e.message
              || "Ошибка изменения подписки";
          console.error("subscribe error", e.response?.status, e.response?.data);
          alert(msg);
        }
      }

      function escHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
      }

      document.addEventListener("DOMContentLoaded", () => {
        if (!localStorage.getItem("access_token")) {
          window.location.href = "login_page.html";
          return;
        }

        const saved = localStorage.getItem("theme");
        if (saved === "dark") document.body.classList.add("dark-theme");
        const toggle = document.getElementById("theme-toggle");
        if (toggle) {
          toggle.textContent = document.body.classList.contains("dark-theme") ? "☀️" : "🌙";
          toggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-theme");
            const dark = document.body.classList.contains("dark-theme");
            localStorage.setItem("theme", dark ? "dark" : "light");
            toggle.textContent = dark ? "☀️" : "🌙";
          });
        }
        loadCourses();
      });
    </script>
  </body>
</html>
