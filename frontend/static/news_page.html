<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Новость</title>

    <link rel="stylesheet" href="styles/main_page.css" />
    <link rel="stylesheet" href="styles/news_page.css" />
  </head>

  <body>
    <header>
      <div class="header-container">
        <div class="logo">
          <h1>Obuchator</h1>
        </div>

        <!-- Поиск -->
        <div class="center-search">
          <input
            type="text"
            class="search-center-input"
            placeholder="Поиск по сайту..."
            aria-label="Поиск"
          />
          <button class="search-center-button" type="button" aria-label="Найти">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="18"
              height="18"
            >
              <path
                fill="currentColor"
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
          </button>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Переключить тему"
        >
          🌙
        </button>
        <!-- Иконка профиля -->
        <div class="header-right">
          <div class="profile-menu">
            <button
              class="profile-button"
              aria-label="Профиль пользователя"
              onclick="location.href='profile_page.html'"
            >
              <p>Профиль</p>
              <svg
                class="profile-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path
                  fill="currentColor"
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            </button>

            <button id="logout-btn" class="action-btn logout-btn">Выйти</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Основной контейнер (как на странице курса: левая панель + правый контент) -->
    <div class="header-container">
      <!-- Левая панель (адаптирована под новости) -->
      <aside class="left-panel">
        <div class="panel-title">📰 Другие новости</div>
        <ul class="other-news-list" id="other-news-list">
          <!-- сюда JS будет вставлять другие новости -->
        </ul>
        <div
          id="no-other-news"
          style="display: none; text-align: center; padding: 20px"
        >
          Пока нет других новостей
        </div>
        <div class="back-to-news">
          <a href="main_page.html" class="action-btn back-btn">← Все новости</a>
        </div>
      </aside>

      <!-- Правая часть: контент новости -->
      <main class="right-content">
        <div class="course-content" style="padding: 20px">
          <!-- Блок новости с динамическими данными из API -->
          <div class="news-header">
            <h1 id="news-title">Загрузка...</h1>
            <div class="news-meta">
              <span> <span id="news-author"></span></span>
              <span> <span id="news-date"></span></span>
            </div>
          </div>

          <div id="news-content" class="news-content">
            <p>Загрузка содержания новости...</p>
          </div>

          <div class="news-stats">
            <span>❤️ <span id="news-likes">0</span></span>
            <span>👁 <span id="news-views">0</span></span>
          </div>

          <button id="like-btn" class="like-btn">👍 Поставить лайк</button>
        </div>
      </main>
    </div>

    <footer>
      <p>© ИТС</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/news_detail.js"></script>
    <script src="js/news.js"></script>

    <script>
      (function () {
        const themeToggle = document.getElementById("theme-toggle");
        const saved = localStorage.getItem("theme");
        if (saved === "dark") document.body.classList.add("dark-theme");
        if (themeToggle) {
          themeToggle.textContent = document.body.classList.contains(
            "dark-theme",
          )
            ? "☀️"
            : "🌙";
          themeToggle.addEventListener("click", () => {
            document.body.classList.toggle("dark-theme");
            const isDark = document.body.classList.contains("dark-theme");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            themeToggle.textContent = isDark ? "☀️" : "🌙";
          });
        }
      })();
    </script>
  </body>
</html>
