<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Создание новости | Обучатор</title>
    <link rel="stylesheet" href="styles/add_news_page.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="logo">
          <h1>Obuchator</h1>
        </div>
        <div class="center-search">
          <input
            type="text"
            class="search-center-input"
            placeholder="Поиск по сайту..."
          />
          <button class="search-center-button" type="button" aria-label="Найти">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="18"
              height="18"
            >
              <path
                fill="currentColor"
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
          </button>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Переключить тему"
        >
          🌙
        </button>
        <div class="header-right">
          <div class="profile-menu">
            <button
              class="profile-button"
              onclick="location.href='profile_page.html'"
            >
              <p>Профиль</p>
              <svg class="profile-icon" width="24" height="24">
                <use xlink:href="#profile-icon"></use>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Основной контейнер -->
    <div class="news-editor-container">
      <!-- Левая панель со списком новостей -->
      <div class="news-sidebar">
        <div class="sidebar-header">
          <h3>Новости</h3>
          <span class="news-count" id="news-count">0</span>
        </div>
        <div class="news-list" id="news-list"></div>
        <button class="add-news-btn" id="add-news-btn">
          + Добавить новость
        </button>
        <button class="back-button" onclick="history.back()">
          <span>←</span> Назад
        </button>
      </div>

      <!-- Правая часть – редактор новости -->
      <div class="news-editor">
        <div class="editor-header">
          <h2 id="editor-title">Создание новости</h2>
          <span class="save-status" id="save-status">✔ Все сохранено</span>
        </div>

        <div class="form-group">
          <label for="news-title">Заголовок новости</label>
          <input
            type="text"
            id="news-title"
            class="editor-input"
            placeholder="Введите заголовок"
          />
        </div>

        <div class="form-group">
          <label for="news-category">Категория</label>
          <select id="news-category" class="editor-select">
            <option value="Важное">Важное</option>
            <option value="Событие">Событие</option>
            <option value="Обновление">Обновление</option>
            <option value="Учёба">Учёба</option>
            <option value="Успех">Успех</option>
            <option value="Помощь">Помощь</option>
          </select>
        </div>

        <div class="form-group">
          <label for="news-excerpt">Краткое описание (до 200 символов)</label>
          <textarea
            id="news-excerpt"
            class="editor-textarea"
            placeholder="Краткое описание..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Изображение новости (обложка)</label>
          <div class="image-upload-area" id="image-upload-area">
            <input type="file" id="news-image" accept="image/*" />
            <span>+ Нажмите или перетащите изображение</span>
            <img
              class="image-preview"
              id="image-preview"
              src="#"
              alt="Превью"
            />
          </div>
        </div>

        <div class="form-group">
          <label>Полный текст новости</label>
          <div class="editor-toolbar">
            <button type="button" data-command="h3" title="Заголовок">
              <strong>Заголовок</strong>
            </button>
            <button type="button" data-command="p" title="Параграф">
              Абзац
            </button>
            <button type="button" data-command="bold" title="Жирный">
              <strong>Жирный</strong>
            </button>
            <button type="button" data-command="italic" title="Курсив">
              <em>Курсив</em>
            </button>
            <button type="button" data-command="code" title="Блок кода">
              <code>&lt;/&gt;</code>
            </button>
            <button
              type="button"
              data-command="info"
              title="Информационный блок"
            >
              Info
            </button>
            <button
              type="button"
              data-command="ul"
              title="Маркированный список"
            >
              • Список
            </button>
            <button type="button" data-command="ol" title="Нумерованный список">
              1. Список
            </button>
            <button
              type="button"
              data-command="removeFormat"
              title="Очистить формат"
            >
              Очистить
            </button>
          </div>
          <div
            id="news-content"
            class="editable-content"
            contenteditable="true"
          ></div>
        </div>

        <div class="editor-actions">
          <button class="preview-btn" id="preview-btn">Предпросмотр</button>
          <button class="save-btn" id="save-btn">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Модальное окно предпросмотра -->
    <div id="preview-modal">
      <div class="modal-content">
        <button class="close-modal" id="close-preview">&times;</button>
        <h2 id="preview-title"></h2>

        <!-- Карточка новости (краткое описание) -->
        <div class="preview-card" id="preview-card">
          <h3>Превью карточки</h3>
          <div class="news-meta">
            <span id="preview-category"></span>
            <span id="preview-date"></span>
          </div>
          <div id="preview-excerpt" class="news-excerpt"></div>
          <img
            id="preview-card-image"
            class="news-image"
            src="#"
            alt=""
            style="display: none"
          />
        </div>

        <!-- Полная статья -->
        <div class="preview-full">
          <h4>Полный текст</h4>
          <div
            id="preview-full-content"
            class="news-content"
            style="line-height: 1.6"
          ></div>
        </div>
      </div>
    </div>

    <footer>
      <p>© ИТС</p>
    </footer>

    <!-- SVG иконки -->
    <svg style="display: none">
      <symbol id="profile-icon" viewBox="0 0 24 24">
        <path
          d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
        />
      </symbol>
    </svg>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/news.js"></script>
    <script src="js/add_news.js"></script>
    <script src="js/main.js"></script>
    <script>
      requireAuth();
    </script>
  </body>
</html>
