<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/registr_login.css" />
    <title>Регистрация | Обучатор</title>
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="logo">
          <h1>Obuchator</h1>
        </div>

        <!-- Поиск -->
        <div class="center-search">
          <input
            type="text"
            class="search-center-input"
            placeholder="Поиск по сайту..."
            aria-label="Поиск"
          />
          <button class="search-center-button" type="button" aria-label="Найти">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              width="18"
              height="18"
            >
              <path
                fill="currentColor"
                d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"
              />
            </svg>
          </button>
        </div>
        <button
          id="theme-toggle"
          class="theme-toggle"
          aria-label="Переключить тему"
        >
          🌙
        </button>
        <!-- Иконкка профиля -->
        <div class="header-right">
          <div class="profile-menu">
            <button
              class="profile-button"
              aria-label="Профиль пользователя"
              onclick="location.href='profile_page.html'"
            >
              <p>Профиль</p>
              <svg
                class="profile-icon"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                width="24"
                height="24"
              >
                <path
                  fill="currentColor"
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div class="auth-container">
      <div class="auth-card">
        <h2 class="auth-title">Регистрация</h2>

        <form id="registerForm">
          <div class="form-group">
            <label for="email" class="form-label">Электронная почта</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="example@mail.com"
              required
              autocapitalize="none"
            />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Пароль</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Минимум 6 символов"
              minlength="6"
              required
              autocapitalize="none"
            />
          </div>
          <div class="form-group">
            <label for="first_name">Имя</label>
            <input
              type="text"
              id="first_name"
              name="first_name"
              class="form-input"
              required
            />
          </div>
          <div class="form-group">
            <label for="last_name">Фамилия</label>
            <input
              type="text"
              id="last_name"
              name="last_name"
              class="form-input"
              required
            />
          </div>
          <button type="submit" class="auth-button">Зарегистрироваться</button>
        </form>

        <div class="login-link">
          Уже есть аккаунт? <a href="login_page.html">Войдите</a>
        </div>
      </div>
    </div>

    <footer>
      <p>© ИТС</p>
    </footer>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/reg_log.js"></script>
  <script src="js/theme.js"></script>
</html>
